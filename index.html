<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Психологический помощник</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    // Тонкий загрузчик: подтягивает актуальную версию приложения, обходя кэш.
    // Менять контент/логику/стили нужно в app.js — изменения видны мгновенно.
    (function () {
      var s = document.createElement("script");
      s.src = "app.js?t=" + Date.now();
      s.onerror = function () {
        document.getElementById("app").textContent =
          "Не удалось загрузить приложение. Проверьте интернет и попробуйте снова.";
      };
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
